version: '3.8'

services:
  api:
    build:
      context: ./backend/SecureAuthAPI
      dockerfile: Dockerfile
    container_name: secureauth-lite-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/secureauth.db
      - Jwt__Secret=${JWT_SECRET}
      - Jwt__Issuer=SecureAuthAPI
      - Jwt__Audience=SecureAuthClients
    ports:
      - "5003:80"
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: secureauth-lite-frontend
    ports:
      - "5004:80"
    depends_on:
      - api